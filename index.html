<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폰트 비교</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
    <h1>폰트 비교</h1>
    <span class="subtitle" id="appSubtitle">펴진고딕 vs 프리텐다드</span>
</header>

<div class="control-panel">
    <div class="control-group">
        <label>폰트 A</label>
        <select class="font-select" id="fontSelectA">
            <option value="PyeojinGothic" selected>펴진고딕</option>
            <option value="Pretendard">프리텐다드</option>
            <option value="WantedSans">Wanted Sans</option>
            <option value="Suit">수트</option>
            <option value="MinSans">민산스</option>
            <option value="SpoqaHanSansNeo">스포카 한 산스 네오</option>
            <option value="Noto Sans KR">노토 산스 KR</option>
        </select>
    </div>
    <div class="control-group">
        <label>폰트 B</label>
        <select class="font-select" id="fontSelectB">
            <option value="PyeojinGothic">펴진고딕</option>
            <option value="Pretendard" selected>프리텐다드</option>
            <option value="WantedSans">Wanted Sans</option>
            <option value="Suit">수트</option>
            <option value="MinSans">민산스</option>
            <option value="SpoqaHanSansNeo">스포카 한 산스 네오</option>
            <option value="Noto Sans KR">노토 산스 KR</option>
        </select>
    </div>
    <div class="control-group text-input-group">
        <label>비교 텍스트</label>
        <textarea class="text-input" id="compareText" rows="2">가나다라마바사 아자차카타파하 ABC abc 0123456789</textarea>
    </div>
    <div class="control-group">
        <label>굵기</label>
        <div class="weight-buttons">
            <button class="weight-btn" data-weight="300">300</button>
            <button class="weight-btn active" data-weight="400">400</button>
            <button class="weight-btn" data-weight="500">500</button>
            <button class="weight-btn" data-weight="700">700</button>
        </div>
    </div>
</div>

<div class="comparison-area">

    <!-- 왼쪽: 아웃라인/채움 비교 -->
    <div class="comp-pane">
        <div class="pane-header">
            <div class="pane-info">
                <span class="legend-chip outline-chip" id="chipA">펴진고딕</span>
                <span class="legend-chip fill-chip" id="chipB">프리텐다드</span>
            </div>
            <div class="pane-slider-wrap">
                <label class="pair-toggle">
                    <input type="checkbox" id="charPairMode">
                    글자별 비교
                </label>
                <div class="baseline-wrap">
                    <span class="baseline-label">B 베이스라인</span>
                    <input type="range" class="slider" id="baselineB" min="-50" max="50" value="0" step="0.5">
                    <span class="slider-val" id="baselineBVal">0px</span>
                </div>
                <input type="range" class="slider" id="fontSizeLeft" min="10" max="300" value="200">
                <span class="slider-val" id="fontSizeLeftVal">200px</span>
            </div>
        </div>
        <div class="pane-viewport overlay-viewport" id="leftViewport">
            <div class="text-layer" id="leftLayerA"></div>
            <div class="text-layer" id="leftLayerB"></div>
            <div class="char-pairs" id="leftCharPairs"></div>
        </div>
    </div>

    <div class="pane-divider"></div>

    <!-- 오른쪽: 상하 비교 -->
    <div class="comp-pane">
        <div class="pane-header">
            <div class="pane-info">
                <span class="pane-title">상하 비교</span>
            </div>
            <div class="pane-slider-wrap">
                <input type="range" class="slider" id="fontSizeRight" min="10" max="120" value="24">
                <span class="slider-val" id="fontSizeRightVal">24px</span>
            </div>
        </div>
        <div class="pane-viewport vertical-viewport" id="rightViewport">
            <div class="v-block">
                <div class="v-label" id="rightLabelA">펴진고딕</div>
                <div class="v-text" id="rightTextA"></div>
            </div>
            <div class="v-divider"></div>
            <div class="v-block">
                <div class="v-label" id="rightLabelB">프리텐다드</div>
                <div class="v-text" id="rightTextB"></div>
            </div>
        </div>
    </div>

</div>

<!-- 글자 확대 모달 -->
<div class="modal-overlay" id="charModal">
    <div class="modal-box">
        <div class="modal-title">글자 확대 비교</div>
        <div class="modal-char-viewport">
            <div class="modal-char-layer" id="modalCharA"></div>
            <div class="modal-char-layer" id="modalCharB"></div>
        </div>
        <div class="modal-legend">
            <div class="modal-legend-item">
                <div class="modal-legend-dot outline-dot"></div>
                <span id="modalLabelA">펴진고딕</span>
            </div>
            <div class="modal-legend-item">
                <div class="modal-legend-dot fill-dot"></div>
                <span id="modalLabelB">프리텐다드</span>
            </div>
        </div>
        <button class="modal-close" id="modalCloseBtn">닫기</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
